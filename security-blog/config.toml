baseURL = 'https://gracecondition.github.io/'
languageCode = 'en-us'
title = 'gracecondition'
theme = 'securityhub'

[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 1
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = false
    # Emit CSS classes (not inline colors) so code blocks can be theme-aware.
    # Palettes live in themes/securityhub/static/css/chroma.css — regenerate with
    #   hugo gen chromastyles --style=monokai   (dark / Nocturne)
    #   hugo gen chromastyles --style=tango     (light / Day)
    noClasses = false
    tabWidth = 4

[params]
  description = "OS internals, binary exploitation, and low-level security research"
  author = "gracecondition"
  keywords = ["security research", "binary exploitation", "OS internals", "vulnerability analysis", "reverse engineering"]
  favicon = "/favicon.png"

  [params.hero]
    title = "gracecondition"
    subtitle = "Deep dives into OS internals, binary exploitation, and low-level security research"

  # Social links (optional)
  # twitter = "https://twitter.com/yourusername"
  # github = "https://github.com/yourusername"
  # linkedin = "https://linkedin.com/in/yourusername"

# Enable sitemap generation
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# Enable RSS
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Related content (powers the "Related" block at the foot of articles).
# Tuned for a small site: match on shared tags/category, include newer posts,
# and a lower threshold so relations actually surface.
[related]
  includeNewer = true
  threshold = 40
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "category"
    weight = 70
  [[related.indices]]
    name = "date"
    weight = 10
